# Local development stack for cardinalconstruct (Laravel 5.5).
#
# Spin up with `./cc up`. Service-aware commands route through
# `docker compose exec` in the ./cc wrapper.
services:
  # PHP application (php-fpm)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cardinalconstruct_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - cardinalconstruct_network
    depends_on:
      - db
      - redis

  # Nginx web server
  webserver:
    image: nginx:alpine
    container_name: cardinalconstruct_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - cardinalconstruct_network
    depends_on:
      - app

  # MySQL database
  db:
    image: mysql:8.0
    container_name: cardinalconstruct_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: cardinalconstruct
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: cardinalconstruct
      MYSQL_PASSWORD: password
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - cardinalconstruct_network

  # Redis
  redis:
    image: redis:alpine
    container_name: cardinalconstruct_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - cardinalconstruct_network

  # Node helper for the legacy gulp / laravel-elixir asset toolchain.
  # Run-only: invoked by `./cc build|dev|npm` via
  # `docker compose --profile tools run --rm node ...`. The `tools` profile
  # keeps it out of the normal `up`. node:10 matches the elixir era.
  node:
    image: node:10
    container_name: cardinalconstruct_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - cardinalconstruct_network
    profiles:
      - tools

networks:
  cardinalconstruct_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
